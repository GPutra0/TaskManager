<!doctype html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager - Internal Tim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      .input-focus {
        transition: all 0.2s;
      }
      .input-focus:focus {
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
      }
    </style>
  </head>
  <body class="h-full bg-gradient-to-br from-indigo-50 to-white">
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-10">
        <div class="text-center mb-10">
          <h1 class="text-4xl font-bold text-indigo-600">Task Manager</h1>
          <p class="text-gray-500 mt-2">Internal Tim</p>
        </div>

        <!-- FORM LOGIN -->
        <div id="login-form">
          <h2 class="text-2xl font-semibold mb-6 text-center">Login</h2>

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
              <input id="login-username" type="text" class="input-focus w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-lg" placeholder="Masukkan username" />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input id="login-password" type="password" class="input-focus w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-lg" placeholder="Masukkan password" />
            </div>

            <button onclick="login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-2xl text-lg transition">Masuk</button>
          </div>

          <p onclick="toggleForm()" class="text-center text-indigo-600 mt-8 cursor-pointer hover:underline">Belum punya akun? <span class="font-semibold">Daftar sekarang</span></p>
        </div>

        <!-- FORM REGISTER (hidden awalnya) -->
        <div id="register-form" class="hidden">
          <h2 class="text-2xl font-semibold mb-6 text-center">Daftar Akun Baru</h2>

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
              <input id="reg-username" type="text" class="input-focus w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-lg" placeholder="Pilih username" />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input id="reg-password" type="password" class="input-focus w-full border border-gray-300 rounded-2xl px-5 py-4 focus:outline-none text-lg" placeholder="Buat password" />
            </div>

            <button onclick="register()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg transition">Daftar</button>
          </div>

          <p onclick="toggleForm()" class="text-center text-indigo-600 mt-8 cursor-pointer hover:underline">Sudah punya akun? <span class="font-semibold">Login</span></p>
        </div>
      </div>
    </div>

    <!-- APP SCREEN (setelah login) -->
    <div id="app-screen" class="hidden min-h-screen flex flex-col">
      <nav class="bg-white shadow p-5 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-indigo-600">Task Manager</h1>
        <div class="flex items-center gap-4">
          <span id="username-display" class="font-medium text-gray-700"></span>
          <button onclick="logout()" class="flex items-center gap-2 text-red-500 hover:text-red-600"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
      </nav>

      <div class="flex-1 p-8 max-w-7xl mx-auto w-full">
        <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-semibold">Daftar Task Saya</h2>
          <div class="flex gap-4">
            <button onclick="showCreateModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl hover:bg-indigo-700 flex items-center gap-2"><i class="fas fa-plus"></i> Task Baru</button>
            <button onclick="showLogsModal()" class="bg-gray-700 text-white px-6 py-3 rounded-2xl hover:bg-gray-800 flex items-center gap-2"><i class="fas fa-history"></i> Log Aktivitas</button>
          </div>
        </div>

        <div id="task-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Tasks akan muncul di sini oleh JavaScript -->
        </div>
      </div>
    </div>

    <!-- Modal Task -->
    <div id="task-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
      <div class="bg-white rounded-3xl p-8 w-full max-w-lg">
        <h3 id="modal-title" class="text-2xl font-semibold mb-6">Buat Task Baru</h3>
        <form id="task-form" class="space-y-6">
          <input type="hidden" id="task-id" />

          <div>
            <label class="block text-sm font-medium mb-2">Judul Task</label>
            <input id="title" type="text" required class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Deskripsi</label>
            <textarea id="description" rows="3" class="w-full border rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-300"></textarea>
          </div>

          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium mb-2">Status</label>
              <select id="status" class="w-full border rounded-2xl px-5 py-4 focus:outline-none">
                <option value="TODO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Due Date</label>
              <input id="dueDate" type="date" class="w-full border rounded-2xl px-5 py-4 focus:outline-none" />
            </div>
          </div>

          <div class="flex gap-4 pt-4">
            <button type="button" onclick="hideModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Batal</button>
            <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-medium">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Logs -->
    <div id="logs-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
      <div class="bg-white rounded-3xl p-8 w-full max-w-2xl max-h-[85vh] overflow-auto">
        <h3 class="text-2xl font-semibold mb-6">Log Aktivitas</h3>
        <div id="logs-content" class="space-y-4 text-sm"></div>
        <button onclick="hideLogsModal()" class="mt-8 w-full py-4 border rounded-2xl font-medium">Tutup</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
